table inet llm_gateway_student {
  chain input {
    type filter hook input priority 0; policy drop;
    ct state established,related accept
    iif lo accept
    iif "eth0" tcp dport 443 accept
  }

  chain output {
    type filter hook output priority 0; policy drop;
    ct state established,related accept
    oif lo accept
    oif "eth1" ip daddr 192.0.2.10 tcp dport 443 accept
    oif "eth1" ip daddr 192.0.2.53 udp dport 53 accept
    oif "eth1" ip daddr 192.0.2.53 tcp dport 53 accept
  }

  chain forward {
    type filter hook forward priority 0; policy drop;
  }
}

