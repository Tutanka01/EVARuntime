# /etc/nginx/sites-available/llm-gateway
#
# Points critiques SSE (streaming) :
#   proxy_buffering off       — désactive le buffer nginx côté réponse
#   X-Accel-Buffering: no     — désactive le buffer nginx côté upstream
#   chunked_transfer_encoding — nécessaire pour le streaming HTTP/1.1
#   proxy_read_timeout 600s   — 10 min max pour une génération longue
#
# Sécurité :
#   /admin/ est restreint au réseau campus (10.x.x.x / 192.168.x.x)
#   TLS 1.2+ uniquement
#   Headers de sécurité HTTP
#   Anti-slowloris : timeouts courts sur header/body du client
#   limit_conn borne les streams SSE concurrents par IP (DoS GPU)

upstream llm_gateway {
    server 127.0.0.1:8000;
    keepalive 32;
    keepalive_timeout 60s;
}

# Zone de rate-limiting nginx (defense-in-depth, complément au rate limiting applicatif)
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=60r/m;
# Zone de limitation des connexions concurrentes (borne les streams SSE par IP)
limit_conn_zone $binary_remote_addr zone=api_conn:10m;

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name llm.eva.univ-pau.fr;

    # Certificat TLS fourni par la DSI UPPA (PKI interne)
    ssl_certificate     /etc/ssl/certs/llm-gateway.crt;
    ssl_certificate_key /etc/ssl/private/llm-gateway.key;

    # TLS moderne uniquement
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Taille max du body (prompts longs) — inchangé
    client_max_body_size 10m;

    # ── Anti-slowloris ────────────────────────────────────────────────────────
    # Un client doit envoyer ses headers et son body sans traîner. Ces timeouts
    # NE s'appliquent qu'à la RÉCEPTION de la requête client (pas au streaming de
    # la réponse, géré par proxy_read_timeout/proxy_send_timeout ci-dessous).
    client_header_timeout   15s;
    client_body_timeout     15s;
    client_body_buffer_size 128k;
    large_client_header_buffers 4 16k;

    # Headers de sécurité HTTP
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;

    # ── Liste des modèles (/v1/models) ─────────────────────────────────────────
    # Route légère, non-streamante : rate-limit souple, PAS de limit_conn stricte
    # (une requête GET rapide ne doit pas consommer un slot de concurrence GPU).
    location = /v1/models {
        limit_req zone=api_zone burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://llm_gateway;
        proxy_http_version 1.1;

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # ── API d'inférence streamante (/v1/chat/completions, /v1/completions) ─────
    # Ces routes déclenchent l'inférence GPU et peuvent streamer (SSE) longtemps.
    # limit_conn borne les streams concurrents par IP → protège le GPU du DoS.
    location ~ ^/v1/(chat/completions|completions|embeddings)$ {
        # Rate limiting nginx (60 req/min par IP, burst de 10)
        limit_req  zone=api_zone burst=10 nodelay;
        limit_req_status 429;
        # Max 4 requêtes d'inférence concurrentes par IP (borne les streams SSE)
        limit_conn api_conn 4;
        limit_conn_status 429;

        proxy_pass http://llm_gateway;

        # HTTP/1.1 requis pour le chunked transfer (streaming SSE)
        proxy_http_version 1.1;

        # CRITIQUE pour le streaming SSE : désactiver TOUT buffering
        proxy_buffering        off;
        proxy_cache            off;
        chunked_transfer_encoding on;

        # Signaler à nginx de ne pas bufferiser la réponse upstream
        add_header X-Accel-Buffering no always;

        # Timeouts généreux pour les inférences longues (NE PAS réduire : casserait
        # les générations longues et le streaming SSE)
        proxy_connect_timeout  10s;
        proxy_send_timeout     600s;
        proxy_read_timeout     600s;

        # Headers de forwarding
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Connection keep-alive vers upstream
        proxy_set_header Connection "";
    }

    # ── Autres routes /v1/ (fallback : tokenize, rerank, etc.) ─────────────────
    # Conserve le comportement streaming/SSE d'origine par prudence, mais borné en
    # concurrence comme les routes d'inférence.
    location /v1/ {
        limit_req  zone=api_zone burst=10 nodelay;
        limit_req_status 429;
        limit_conn api_conn 4;
        limit_conn_status 429;

        proxy_pass http://llm_gateway;
        proxy_http_version 1.1;

        proxy_buffering        off;
        proxy_cache            off;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no always;

        proxy_connect_timeout  10s;
        proxy_send_timeout     600s;
        proxy_read_timeout     600s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ── Health check (pas de rate limit, pas de log) ──────────────────────
    location /health {
        proxy_pass         http://llm_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        access_log         off;
    }

    # ── Admin (réseau campus uniquement) ──────────────────────────────────
    location /admin/ {
        # Restreindre aux plages IP du campus UPPA
        # Adapter ces plages à la configuration réseau réelle
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny  all;

        proxy_pass         http://llm_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";

        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        proxy_read_timeout     30s;
    }

    # Bloquer tout le reste
    location / {
        return 404;
    }
}

# ── Redirection HTTP → HTTPS ──────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name llm.eva.univ-pau.fr;

    location / {
        return 301 https://$host$request_uri;
    }
}
