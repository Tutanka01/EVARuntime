# Registre des modèles — EVA Inference Gateway (UPPA)
#
# Ce fichier est la source de vérité pour les modèles disponibles.
# Il est lu au démarrage de la gateway et peut être modifié via l'API admin.
# Les modifications via l'API sont persistées automatiquement.
#
# Champs obligatoires :
#   id       : identifiant unique (minuscules, chiffres, tirets, points, underscores)
#   path     : chemin absolu vers le fichier .gguf
#   vram_gb  : estimation de la VRAM consommée (poids + KV cache à charge nominale)
#
# Champs optionnels :
#   description : texte libre
#   enabled     : true/false (défaut: true)
#   capabilities: liste parmi [text_generation, tool_calls, streaming, vision, embedding]
#   mmproj_path : chemin absolu vers le fichier .gguf du projector multimodal (clip).
#                 OBLIGATOIRE si 'vision' est dans capabilities — sans lui, llama-server
#                 retourne HTTP 500 sur toute requête contenant une image.
#                 Exemple : /models/llava-v1.6-mistral-7b-mmproj-f16.gguf
#   llama_params: paramètres llama-server (surcharge les défauts)
#   speculative : speculative decoding MTP (Multi-Token Prediction). Bloc optionnel.
#                 La tête MTP est INTÉGRÉE au GGUF (DeepSeek-V3, GLM, etc.) — pas de
#                 modèle draft séparé, pas de VRAM additionnelle (vram_gb inchangé).
#                 Champs : type (mtp), draft_max (nb tokens draftés, défaut 16),
#                 draft_min (défaut 0), draft_p_min (proba min greedy, défaut 0.0).
#                 Le binaire llama-server doit supporter --spec-type (vérifier avec
#                 « llama-server --help | grep spec »). Exemple :
#                   speculative:
#                     type: mtp
#                     draft_max: 16
#
# IMPORTANT — estimation vram_gb :
#   Inclure : poids du modèle + KV cache à concurrence nominale (parallel × ctx_size)
#   Llama 70B Q4_K_M, 4 slots × 32K ctx, KV q8_0 → ~42 GB
#   Llama 8B  Q4_K_M, 8 slots × 32K ctx, KV q8_0 → ~5.5 GB
#
# Budget VRAM L40S 48 GB :
#   Overhead CUDA/framework : ~2.0 GB
#   Marge de sécurité 5%   : ~2.4 GB
#   Budget net disponible   : ~43.6 GB

models:
  - id: "llama-3.3-70b-instruct"
    path: "/models/Llama-3.3-70B-Instruct-Q4_K_M.gguf"
    description: "Llama 3.3 70B Instruct, quantisé Q4_K_M — modèle principal UPPA (L40S 48 GB)"
    vram_gb: 42.0
    enabled: true
    capabilities:
      - text_generation
      - tool_calls
      - streaming
    llama_params:
      n_gpu_layers: 999       # 999 = tout en GPU (plafonné automatiquement)
      ctx_size: 32768          # 4 slots × 8K effective = ~40.5 GB VRAM total
      parallel: 4              # slots d'inférence concurrents
      batch_size: 4096
      ubatch_size: 512
      cache_type_k: "q8_0"    # -50% VRAM KV, qualité quasi-identique à f16
      cache_type_v: "q8_0"
      flash_attn: true         # Ada Lovelace (compute cap 8.9) — supporté
      threads: 8
      threads_http: 4

  - id: "minimax-m2.7"
    path: "/data/models/MiniMax-M2.7-GGUF/UD-IQ4_XS/MiniMax-M2.7-UD-IQ4_XS-00001-of-00004.gguf"
    description: "MiniMax M2.7 IQ4_XS — MoE hybride CPU/GPU : experts FFN sur RAM CPU, attention sur L40S 48 GB"
    vram_gb: 32.0             # Estimation : attention + embeddings + KV cache. Affiner via nvidia-smi au 1er démarrage.
    enabled: true
    load_timeout_seconds: 600  # 248 GB depuis NVMe — chargement ~5-10 min selon le stockage
    capabilities:
      - text_generation
      - streaming
    llama_params:
      n_gpu_layers: 999        # Tout ce qui peut aller sur GPU y va (sauf experts MoE gérés par --cpu-moe)
      ctx_size: 32768
      parallel: 1              # 1 slot : bottleneck sur les experts CPU, pas de gain à paralléliser
      batch_size: 2048
      ubatch_size: 512
      cache_type_k: "q8_0"
      cache_type_v: "q8_0"
      flash_attn: true
      threads: 16              # Plus de threads CPU pour le calcul des experts MoE
      threads_http: 4
      cpu_moe: true            # --cpu-moe : déporte les experts FFN sur CPU pour tenir en VRAM

  - id: "gemma-4-26b-a4b"
    path: "/models/gemma-4-26b-it-a4b-Q4_K_M.gguf"    # À ajuster selon le chemin réel
    description: "Gemma4 with MoE architecture"
    vram_gb: 26.9
    enabled: true
    load_timeout_seconds: 300    # MoE — chargement plus lent, surtout en parallèle
    capabilities:
      - text_generation
      - streaming
    llama_params:
      n_gpu_layers: 999
      ctx_size: 16384             # Réduit pour coexister avec qwen3.5-9b (~7 GB) sur 48 GB
      parallel: 2
      batch_size: 2048
      ubatch_size: 512
      cache_type_k: "q8_0"
      cache_type_v: "q8_0"
      flash_attn: true
      threads: 8
      threads_http: 4

  - id: "qwen3.5-9b-q5_k_m"
    path: "/data/models/qwen3.5-27B-Claude/Qwen3.5-27B.Q5_K_M.gguf"
    description: "Qwen3.5 27B MoE (9B active params), Q5_K_M — experts FFN sur CPU, attention sur GPU"
    vram_gb: 7.0                 # Correct AVEC --cpu-moe : seules les couches attention + embeddings sont en GPU
    enabled: true
    capabilities:
      - text_generation
      - streaming
    llama_params:
      n_gpu_layers: 999
      ctx_size: 32768
      parallel: 4
      batch_size: 2048
      ubatch_size: 512
      cache_type_k: "q8_0"
      cache_type_v: "q8_0"
      flash_attn: true
      threads: 8               # Plus de threads pour les experts CPU
      threads_http: 4
      cpu_moe: true            # OBLIGATOIRE — sans ce flag les experts FFN saturent la VRAM

  - id: "llama-3.1-8b-instruct"
    path: "/models/Llama-3.1-8B-Instruct-Q4_K_M.gguf"
    description: "Llama 3.1 8B Instruct, quantisé Q4_K_M — modèle léger / test"
    vram_gb: 5.5
    enabled: false             # Activer quand le fichier .gguf est disponible sur /models/
    capabilities:
      - text_generation
      - streaming
    llama_params:
      n_gpu_layers: 999
      ctx_size: 32768
      parallel: 8              # Plus de slots car modèle léger
      batch_size: 2048
      ubatch_size: 512
      cache_type_k: "q8_0"
      cache_type_v: "q8_0"
      flash_attn: true
      threads: 4
      threads_http: 2
