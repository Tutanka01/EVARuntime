# Drop-in journald pour la LLM Gateway UPPA.
#
# Installation :
#   sudo mkdir -p /etc/systemd/journald.conf.d
#   sudo cp gateway/deploy/journald-llm-gateway.conf \
#           /etc/systemd/journald.conf.d/llm-gateway.conf
#   sudo systemctl restart systemd-journald
#
# ATTENTION : ces réglages sont GLOBAUX au journal système (journald n'a pas de
# quota par-service). Ils bornent la taille totale du journal persistant afin
# d'éviter qu'un service verbeux (llama-server, access-log uvicorn) ne remplisse
# /var/log. Ajuster SystemMaxUse selon l'espace disque réel de /var/log/journal.

[Journal]
# Taille max du journal persistant sur disque.
SystemMaxUse=500M
# Espace laissé libre sur le système de fichiers hébergeant le journal.
SystemKeepFree=1G
# Taille max d'un fichier journal individuel (facilite la rotation).
SystemMaxFileSize=100M
# Rétention temporelle : purge les entrées de plus de 30 jours.
MaxRetentionSec=30day
