# Configuration ruff pour node_agent/ (composant isolé — cf. AGENTS.md).
#
# Même approche conservatrice que gateway/ et gateway-student/ : E + F
# seulement, avec des `per-file-ignores` ciblés.
#
# main.py fait volontairement des `sys.path.insert(...)` suivis d'imports
# modules situés après (cf. docstring en tête du fichier) pour garantir que
# `from config import settings` résout vers node_agent/config.py et non
# gateway/config.py (collision de nom de module top-level). Cela déclenche
# E402 (import pas en tête de fichier) de façon attendue et volontaire — on
# l'ignore ici plutôt que de modifier l'ordre des imports.

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F"]

[tool.ruff.lint.per-file-ignores]
"main.py" = ["E402"]
